const { useState, useEffect, useCallback } = React;

const CASES = ["nom", "acc", "dat", "gen"];
const CASE_LABELS = { nom: "Nominativ", acc: "Akkusativ", dat: "Dativ", gen: "Genitiv" };

const S = [
  // --- NOMINATIV ---
  { b: "", h: "Der Mann", a: " kauft ein Buch.", g: "m", c: "nom", en: "The man buys a book.",

  { b: "", h: "Die Frau", a: " liest die Zeitung.", g: "f", c: "nom", en: "The woman reads the newspaper.",

  { b: "", h: "Das Kind", a: " schläft.", g: "n", c: "nom", en: "The child sleeps.",

  { b: "", h: "Die Stadt", a: " ist sehr alt.", g: "f", c: "nom", en: "The city is very old.",

  { b: "", h: "Das Buch", a: " liegt auf dem Tisch.", g: "n", c: "nom", en: "The book is on the table.",

  { b: "", h: "Der Vater", a: " kocht das Essen.", g: "m", c: "nom", en: "The father cooks the meal.",

  { b: "", h: "Das Problem", a: " ist gelöst.", g: "n", c: "nom", en: "The problem is solved.",

  { b: "", h: "Der Freund", a: " wohnt in Berlin.", g: "m", c: "nom", en: "The friend lives in Berlin.",

  { b: "", h: "Die Mutter", a: " arbeitet heute.", g: "f", c: "nom", en: "The mother is working today.",

  { b: "Wann kommt ", h: "der Zug", a: "?", g: "m", c: "nom", en: "When does the train come?",

  { b: "Wie heißt ", h: "die Straße", a: "?", g: "f", c: "nom", en: "What is the street called?",

  { b: "Kommt ", h: "die Familie", a: " heute?", g: "f", c: "nom", en: "Is the family coming today?",

  { b: "Wann fängt ", h: "der Film", a: " an?", g: "m", c: "nom", en: "When does the film start?",

  { b: "Ist ", h: "das Essen", a: " fertig?", g: "n", c: "nom", en: "Is the food ready?",

  { b: "Warum ist ", h: "die Tür", a: " offen?", g: "f", c: "nom", en: "Why is the door open?",

  { b: "", h: "Ein Mann", a: " steht vor der Tür.", g: "m", c: "nom", en: "A man is standing at the door.",

  { b: "", h: "Eine Frau", a: " wartet draußen.", g: "f", c: "nom", en: "A woman is waiting outside.",

  { b: "Ist das ", h: "ein Problem", a: "?", g: "n", c: "nom", en: "Is that a problem?",

  { b: "", h: "Ein Kind", a: " spielt im Garten.", g: "n", c: "nom", en: "A child is playing in the garden.",

  // --- AKKUSATIV ---
  { b: "Ich sehe ", h: "den Mann", a: ".", g: "m", c: "acc", en: "I see the man.",

  { b: "Sie besucht ", h: "die Frau", a: ".", g: "f", c: "acc", en: "She visits the woman.",

  { b: "Wir brauchen ", h: "das Geld", a: ".", g: "n", c: "acc", en: "We need the money.",

  { b: "Sie kennt ", h: "die Stadt", a: " gut.", g: "f", c: "acc", en: "She knows the city well.",

    exp: "die Stadt is the direct object. Direct objects take the Akkusativ. Feminine nouns don't change." },
  { b: "Ich lese ", h: "den Text", a: ".", g: "m", c: "acc", en: "I read the text.",

  { b: "Er versteht ", h: "die Frage", a: " nicht.", g: "f", c: "acc", en: "He doesn't understand the question.",

  { b: "Sie sucht ", h: "den Weg", a: ".", g: "m", c: "acc", en: "She is looking for the way.",

    exp: "den Weg is the direct object. Direct objects take the Akkusativ. Masculine nouns change: der → den." },
  { b: "Kennst du ", h: "den Vater", a: "?", g: "m", c: "acc", en: "Do you know the father?",

  { b: "Hast du ", h: "das Geld", a: " gefunden?", g: "n", c: "acc", en: "Did you find the money?",

  { b: "Rufst du ", h: "den Arzt", a: " an?", g: "m", c: "acc", en: "Are you calling the doctor?",
    q: "Wen rufst du an?",

  { b: "Hörst du ", h: "die Musik", a: "?", g: "f", c: "acc", en: "Do you hear the music?",
    q: "Was hörst du?",
    exp: "die Musik is the direct object — what is heard. Direct objects take the Akkusativ. Feminine nouns don't change." },
  { b: "Siehst du ", h: "den Mond", a: "?", g: "m", c: "acc", en: "Do you see the moon?",
    q: "Was siehst du?",
    exp: "den Mond is the direct object. Direct objects take the Akkusativ. Masculine nouns change: der → den." },
  { b: "Er trinkt ", h: "das Wasser", a: ".", g: "n", c: "acc", en: "He drinks the water.",
    q: "Was trinkt er?",
    exp: "das Wasser is the direct object — what is drunk. Direct objects take the Akkusativ. Neuter nouns don't change." },
  { b: "Öffnest du ", h: "das Fenster", a: "?", g: "n", c: "acc", en: "Are you opening the window?",
    q: "Was öffnest du?",
    exp: "das Fenster is the direct object — what is being opened. Direct objects take the Akkusativ. Neuter nouns don't change." },
  { b: "Wir brauchen ", h: "die Hilfe", a: ".", g: "f", c: "acc", en: "We need the help.",
    q: "Was brauchen wir?",
    exp: "die Hilfe is the direct object. Direct objects take the Akkusativ. Feminine nouns don't change." },
  { b: "Ich suche ", h: "einen Arzt", a: ".", g: "m", c: "acc", en: "I'm looking for a doctor.",
    q: "Wen suche ich?",
    exp: "einen Arzt is the direct object. Direct objects take the Akkusativ. Masculine indefinite article changes: ein → einen in the Akkusativ." },
  { b: "Hast du ", h: "eine Idee", a: "?", g: "f", c: "acc", en: "Do you have an idea?",

    exp: "eine Idee is the direct object. Direct objects take the Akkusativ. Feminine indefinite article doesn't change: eine stays eine." },
  { b: "Er kauft ", h: "ein Auto", a: ".", g: "n", c: "acc", en: "He buys a car.",

  { b: "Brauchst du ", h: "einen Stift", a: "?", g: "m", c: "acc", en: "Do you need a pen?",
    q: "Was brauchst du?",
    exp: "einen Stift is the direct object. Direct objects take the Akkusativ. Masculine indefinite article changes: ein → einen." },
  { b: "Ich habe ", h: "eine Frage", a: ".", g: "f", c: "acc", en: "I have a question.",
    q: "Was habe ich?",
    exp: "eine Frage is the direct object. Direct objects take the Akkusativ. Feminine indefinite article stays eine." },
  { b: "Siehst du ", h: "mich", a: "?", g: "", c: "acc", en: "Do you see me?",
    q: "Wen siehst du?",
    exp: "mich is the first-person singular accusative pronoun — the direct object. Just as den Mann takes the Akkusativ, so does mich. ich → mich in the Akkusativ." },
  { b: "Ich sehe ", h: "ihn", a: " jeden Tag.", g: "", c: "acc", en: "I see him every day.",
    q: "Wen sehe ich?",
    exp: "ihn is the third-person masculine accusative pronoun. Just as den Mann takes the Akkusativ as a direct object, so does ihn. er → ihn in the Akkusativ." },
  { b: "Er liebt ", h: "sie", a: ".", g: "", c: "acc", en: "He loves her.",
    q: "Wen liebt er?",

  { b: "Sie versteht ", h: "uns", a: " nicht.", g: "", c: "acc", en: "She doesn't understand us.",

  { b: "Rufst du ", h: "mich", a: " an?", g: "", c: "acc", en: "Are you calling me?",

  { b: "Kennst du ", h: "ihn", a: "?", g: "", c: "acc", en: "Do you know him?",

  { b: "Gehört dieses Buch ", h: "der Lehrerin", a: "?", g: "f", c: "dat", en: "Does this book belong to the teacher?",

  { b: "Er hilft ", h: "der Frau", a: ".", g: "f", c: "dat", en: "He helps the woman.",

  { b: "Kannst du ", h: "dem Kind", a: " helfen?", g: "n", c: "dat", en: "Can you help the child?",

  { b: "Glaubst du ", h: "dem Arzt", a: "?", g: "m", c: "dat", en: "Do you believe the doctor?",

  { b: "Er antwortet ", h: "dem Lehrer", a: ".", g: "m", c: "dat", en: "He answers the teacher.",
    q: "Wem antwortet er?",
    exp: "antworten always takes the Dativ. Masculine: der → dem." },
  { b: "Passt das ", h: "der Frau", a: "?", g: "f", c: "dat", en: "Does that suit the woman?",

  { b: "Er fehlt ", h: "dem Kind", a: ".", g: "n", c: "dat", en: "The child misses him.",

  { b: "Vertraust du ", h: "dem Freund", a: "?", g: "m", c: "dat", en: "Do you trust the friend?",

  { b: "Folgt er ", h: "dem Mann", a: "?", g: "m", c: "dat", en: "Is he following the man?",

  { b: "Hörst du ", h: "dem Kind", a: " zu?", g: "n", c: "dat", en: "Are you listening to the child?",

  { b: "Wir kommen aus ", h: "der Stadt", a: ".", g: "f", c: "dat", en: "We come from the city.",

  { b: "Er wohnt bei ", h: "einem Freund", a: ".", g: "m", c: "dat", en: "He lives with a friend.",
    q: "bei → always Dativ",
    exp: "bei always takes the Dativ. Masculine indefinite article changes: ein → einem." },
  { b: "Er spricht mit ", h: "dem Kind", a: ".", g: "n", c: "dat", en: "He speaks with the child.",

  { b: "Fährst du mit ", h: "dem Bus", a: "?", g: "m", c: "dat", en: "Are you going by bus?",

  { b: "Außer ", h: "dem Vater", a: " ist niemand zu Hause.", g: "m", c: "dat", en: "Apart from the father, nobody is at home.",

  { b: "Er vertraut ", h: "einem Freund", a: " blind.", g: "m", c: "dat", en: "He trusts a friend completely.",

const MODES = [
  { id: "all", label: "alle" },
  { id: "nom", label: "nom" },
  { id: "acc", label: "akk" },
  { id: "dat", label: "dat" },
  { id: "gen", label: "gen" },
];

function weight(s) {
  if (!s) return 4;
  const t = s.c + s.w;
  if (!t) return 4;
  return 1 + (s.w / t) * 4;
}

function pickWeighted(items, weightFn) {
  const weights = items.map(weightFn);
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    r -= weights[i];
    if (r <= 0) return items[i];
  }
  return items[0];
}

function loadStats() {
  try {
    const raw = localStorage.getItem("case_stats_v2");
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}

function saveStats(s) {
  try { localStorage.setItem("case_stats_v2", JSON.stringify(s)); } catch (e) {}
}

function App() {
  const [mode, setMode] = useState("all");
  const [stats, setStats] = useState(() => loadStats());
  const [currentIdx, setCurrentIdx] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [chosenCase, setChosenCase] = useState(null);
  const [sessionTotal, setSessionTotal] = useState(0);
  const [sessionCorrect, setSessionCorrect] = useState(0);

  const pool = useCallback((m) => S.map((_, i) => i).filter(i => m === "all" || S[i].c === m), []);

  const nextCard = useCallback((m, st) => {
    const p = pool(m);
    const idx = pickWeighted(p, i => weight(st[i]));
    setCurrentIdx(idx);
    setAnswered(false);
    setChosenCase(null);
  }, [pool]);

  useEffect(() => { nextCard(mode, stats); }, []); // eslint-disable-line

  const handleMode = (m) => {
    setMode(m);
    nextCard(m, stats);
    setSessionTotal(0);
    setSessionCorrect(0);
  };

  const handleGuess = (c) => {
    if (answered) return;
    setAnswered(true);
    setChosenCase(c);
    const item = S[currentIdx];
    const correct = c === item.c;
    setSessionTotal(t => t + 1);
    if (correct) setSessionCorrect(sc => sc + 1);
    const prev = stats[currentIdx] || { c: 0, w: 0 };
    const newStats = { ...stats, [currentIdx]: { c: prev.c + (correct ? 1 : 0), w: prev.w + (correct ? 0 : 1) } };
    setStats(newStats);
    saveStats(newStats);
  };

  const handleNext = () => nextCard(mode, stats);

  const p = pool(mode);
  const seen = p.filter(i => stats[i]).length;
  const progress = p.length ? Math.round(seen / p.length * 100) : 0;
  const accuracy = sessionTotal > 0 ? Math.round(sessionCorrect / sessionTotal * 100) + "%" : "—";
  const item = currentIdx !== null ? S[currentIdx] : null;
  const isWrong = answered && item && chosenCase !== item.c;
  const isRight = answered && item && chosenCase === item.c;

  const ec = isRight
    ? { bg: "#F4FAF0", border: "#a0d080", head: "#3B6D11", body: "#2d5a0e", sub: "#4a8020", q: "#1a4a0a" }
    : { bg: "#FFF8F0", border: "#f0c080", head: "#9a6000", body: "#7a5000", sub: "#a07030", q: "#7a4800" };

  const weakItems = p
    .filter(i => stats[i] && stats[i].c + stats[i].w >= 3 && stats[i].w / (stats[i].c + stats[i].w) >= 0.4)
    .sort((a, b) => (stats[b].w / (stats[b].c + stats[b].w)) - (stats[a].w / (stats[a].c + stats[a].w)))
    .slice(0, 6);

  return React.createElement('div', { style: { fontFamily: "-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif", maxWidth: 480, margin: "0 auto", padding: "env(safe-area-inset-top, 1rem) 1rem 2rem" } },
    // Mode switcher
    React.createElement('div', { style: { display: "flex", gap: 5, marginBottom: "1.5rem", marginTop: "1rem" } },
      MODES.map(m => React.createElement('button', {
        key: m.id, onClick: () => handleMode(m.id),
        style: { flex: 1, padding: "0.45rem 0.2rem", fontSize: 12, fontFamily: "inherit", border: "0.5px solid", borderRadius: 8, cursor: "pointer", background: mode === m.id ? "white" : "#c8c6c0", color: mode === m.id ? "#111" : "#555", borderColor: mode === m.id ? "#888" : "#b0aea8", fontWeight: mode === m.id ? 500 : 400 }
      }, m.label))
    ),
    // Stats
    React.createElement('div', { style: { display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: "1.5rem" } },
      [["session", sessionTotal], ["correct", sessionCorrect], ["accuracy", accuracy]].map(([label, val]) =>
        React.createElement('div', { key: label, style: { background: "#eeede8", borderRadius: 8, padding: "0.6rem", textAlign: "center" } },
          React.createElement('div', { style: { fontSize: 11, color: "#888", marginBottom: 2 } }, label),
          React.createElement('div', { style: { fontSize: 18, fontWeight: 500 } }, val)
        )
      )
    ),
    // Progress bar
    React.createElement('div', { style: { background: "#dddbd5", borderRadius: 4, height: 4, overflow: "hidden", marginBottom: "1.5rem" } },
      React.createElement('div', { style: { height: 4, background: "#1D9E75", width: progress + "%", transition: "width 0.3s", borderRadius: 4 } })
    ),
    // Card
    React.createElement('div', { style: { background: "white", border: "0.5px solid #e0deda", borderRadius: 12, padding: "1.5rem", textAlign: "center", marginBottom: "1.25rem" } },
      React.createElement('div', { style: { fontSize: 11, color: "#aaa", letterSpacing: "0.05em", marginBottom: 12 } }, "was ist der Fall?"),
      item && React.createElement('div', { style: { fontSize: 19, fontWeight: 500, lineHeight: 1.6, marginBottom: 8 } },
        item.b && React.createElement('span', null, item.b),
        React.createElement('span', { style: { color: "#185FA5", borderBottom: "2px solid #185FA5", paddingBottom: 1 } },
          item.h,
          item.g && React.createElement('sup', { style: { fontSize: 10, color: "#185FA5", fontWeight: 400, marginLeft: 2 } }, item.g)
        ),
        React.createElement('span', null, item.a)
      ),
      item && React.createElement('div', { style: { fontSize: 13, color: "#aaa", fontStyle: "italic", marginBottom: answered ? 16 : 0 } }, item.en),
      answered && item && React.createElement('div', { style: { marginTop: 4, padding: "12px 14px", borderRadius: 8, textAlign: "left", background: ec.bg, border: `0.5px solid ${ec.border}` } },
        React.createElement('div', { style: { fontSize: 12, fontWeight: 500, marginBottom: 6, color: ec.head } },
          isRight ? "Richtig — " : "Das ist der ", CASE_LABELS[item.c], "."
        ),
        React.createElement('div', { style: { fontSize: 11, color: ec.sub, marginBottom: 6 } },
          "wer? who · wen? whom · wem? to/for whom · wessen? whose"
        ),
        React.createElement('div', { style: { fontSize: 13, fontStyle: "italic", fontWeight: 500, color: ec.q, marginBottom: 8, paddingBottom: 8, borderBottom: `0.5px solid ${ec.border}` } }, item.q),
        React.createElement('div', { style: { fontSize: 13, lineHeight: 1.6, color: ec.body } }, item.exp),
        item.spoken && React.createElement('div', { style: { marginTop: 10, paddingTop: 10, borderTop: `0.5px solid ${ec.border}` } },
          React.createElement('div', { style: { fontSize: 11, fontWeight: 500, color: ec.head, marginBottom: 3 } }, "In informal spoken German:"),
          React.createElement('div', { style: { fontSize: 13, fontStyle: "italic", color: ec.body } }, item.spoken),
          React.createElement('div', { style: { fontSize: 12, color: ec.sub, marginTop: 3 } }, "The Genitiv is replaced with von + Dativ, which is standard in everyday speech.")
        )
      )
    ),
    // Answer buttons
    React.createElement('div', { style: { display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10, marginBottom: "1.25rem" } },
      CASES.map(c => React.createElement('button', {
        key: c, onClick: () => handleGuess(c), disabled: answered,
        style: { padding: "0.7rem", fontSize: 14, fontFamily: "inherit", borderRadius: 8, cursor: answered ? "default" : "pointer",
          ...(answered
            ? c === item?.c ? { background: "#EAF3DE", border: "1px solid #639922", color: "#3B6D11" }
              : c === chosenCase ? { background: "#FCEBEB", border: "1px solid #E24B4A", color: "#A32D2D" }
              : { background: "white", border: "0.5px solid #ddd", color: "#bbb" }
            : { background: "white", border: "0.5px solid #ccc", color: "#111" }) }
      }, CASE_LABELS[c]))
    ),
    // Weiter button
    answered && React.createElement('div', { style: { textAlign: "center", marginBottom: "1rem" } },
      React.createElement('button', {
        onClick: handleNext,
        style: { padding: "0.6rem 2.5rem", fontSize: 14, fontFamily: "inherit", border: "0.5px solid #888", borderRadius: 8, background: "white", color: "#111", cursor: "pointer", fontWeight: 500 }
      }, "weiter →")
    ),
    // Weak items
    weakItems.length > 0 && React.createElement('div', { style: { marginTop: "1.5rem" } },
      React.createElement('div', { style: { fontSize: 12, color: "#aaa", marginBottom: 8 } }, "needs work"),
      React.createElement('div', { style: { display: "flex", flexWrap: "wrap", gap: 6 } },
        weakItems.map(i => React.createElement('span', {
          key: i, style: { fontSize: 12, background: "#eeede8", borderRadius: 8, padding: "3px 8px", color: "#666" }
        }, S[i].h, React.createElement('span', { style: { opacity: 0.6 } }, " (", CASE_LABELS[S[i].c].toLowerCase(), ")")))
      )
    ),
    React.createElement('div', { style: { fontSize: 12, color: "#aaa", textAlign: "center", marginTop: "1rem" } },
      seen + " of " + p.length + " sentences seen"
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>
